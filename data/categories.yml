# One entry per category. Drives the generator and the public nav.
#
# For each category:
#   device     -- the durable item the user owns (handle, purifier unit, scooter)
#   parts      -- list of replaceable consumable classes (head, filter, tire)
#
# Each part class declares its own part directory, interface file, interface
# label, and optional table columns. The generator emits pages under
# docs/categories/<slug>/<device.dir>/ and docs/categories/<slug>/<part.dir>/.

toothbrushes:
  display_name: Toothbrushes
  device:
    dir: handles
    singular: Handle
    plural: Handles
  parts:
    - dir: heads
      singular: Head
      plural: Replacement heads
      interface_file: mounts.yml
      interface_singular: Mount
      columns:
        - bristle

openair:
  display_name: Air purifiers
  device:
    dir: units
    singular: Unit
    plural: Air purifier units
  parts:
    - dir: filters
      singular: Filter
      plural: Replacement filters
      interface_file: slots.yml
      interface_singular: Filter slot
      columns:
        - hepa_grade
        - media
      # Override the slug-derived column header when title-casing the slug
      # produces the wrong form (e.g. acronyms).
      column_labels:
        hepa_grade: "HEPA grade"

openscoot:
  display_name: Electric scooters
  device:
    dir: units
    singular: Scooter
    plural: Electric scooters
  parts:
    - dir: tires
      singular: Tire
      plural: Replacement tires
      interface_file: axles.yml
      interface_singular: Axle / wheel mount
      columns:
        - size_etrto
        - tire_type
      column_labels:
        size_etrto: "Size (ETRTO)"
        tire_type: "Type"
    - dir: pads
      singular: Brake pad
      plural: Brake pads
      interface_file: calipers.yml
      interface_singular: Caliper mount
      columns:
        - mount_pattern
        - pad_compound
      column_labels:
        mount_pattern: "Caliper mount"
        pad_compound: "Compound"
