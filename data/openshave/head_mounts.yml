# Head-mount interface profiles for OpenShave.
#
# A "head mount" is the project's term for the mechanical compatibility class
# on the body side of an electric shaver: the seat that retains the rotary
# cutter pod or foil cassette, the drive socket that couples the body motor
# to the head, and any latch / magnetic retention features. Two shavers with
# the same head mount can theoretically accept the same replacement head
# module.
#
# Head mounts are NOT a published spec. They are working categories that may
# collapse, split, or be renamed as measurement lands. A unit entry can use
# `pending-measurement` for `interface` if no evidence yet supports a
# grouping. Family-specific working names are preferred over broad
# "rotary 3-blade universal" framings, because cross-brand convergence is
# not strong enough to justify a single class.
#
# Sub-family note: rotary, foil, and magnetic-rotary are separate consumable
# classes. Rotary heads are removable cutter pods (typically three pods
# arranged in a triangle on a passive plate). Foil heads are reciprocating
# cassettes covered by a perforated metal foil. Do not collapse them into
# one slot. The first OpenShave slice covers rotary 3-blade only.

xiaomi-mijia-s300-s500-rotary:
  display_name: "Xiaomi / Mijia S300-S500 rotary 3-blade"
  aftermarket_aliases:
    - "S300/S500/S500C 刀头"
    - "S300/S500/MJTXD01SKS 通用机头"
    - "米家电动剃须刀刀头"
    - "Mijia S300 S500 replacement head"
    - "内5角"
    - "五角形转轴口"
  charging: usb-c-or-base
  status: unmeasured
  baseline: null
  notes: |
    Xiaomi / Mijia rotary 3-blade head module shared across the S300, S500,
    and S500C bodies, per the Xiaomi official accessory page that names all
    three devices in the product title. Aftermarket sellers on JD and other
    Chinese marketplaces group the legacy `MJTXD01SKS` device code into the
    same listing family ("S300 / S500 / MJTXD01SKS 通用机头"); that
    cross-fit is marketplace-claim only and is the single biggest physical
    test target for Batch A. JD aftermarket vocabulary uses `内5角` /
    `五角形转轴口` ("five-sided drive-socket / shaft-mouth") to describe a
    drive interface; Soocas / Xiaomi shared patent IP also references a
    five-sided shaft matching structure across this family and adjacent
    Soocas / Xiaomi models. Treat the five-sided shaft feature as a
    measurement target, not as a published geometry claim.

