  within-family cross-fit, not a broad ShowSee anchor. The magnetic
  quick-release head ("磁吸式刀头组件") may be a different retention
  class from the passive latched rotary mounts used by F1 / F303-BK
  and F305; treat the three ShowSee head-mount families as separate
  until physical comparison.
