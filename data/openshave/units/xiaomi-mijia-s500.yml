notes: |
  Xiaomi / Mijia S500 rotary three-blade shaver. Step up from the S300 in
  the same family, sharing the official replacement head per the Xiaomi
  accessory page. The S500 / S500C pair adds a basic LED display and a
  small step in motor power vs. the S300 according to launch coverage,
  but those are unit-side differences and do not change the head-mount
  family. Aftermarket marketplace listings cluster S500 with S300, S500C,
  and the legacy MJTXD01SKS device code.
