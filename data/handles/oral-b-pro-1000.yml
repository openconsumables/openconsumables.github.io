notes: |
  Listed for reference. Oral-B does not encode mount class in model names, so the
  buyer-side anchor that the project relies on for the convergence wedge is
  absent. Inclusion here is to give the knowledge graph realistic coverage for
  agent queries ("replacement for my Oral-B Pro 1000"), not to indicate this
  ecosystem is a project measurement target.

  Compatibility within the Oral-B classic round-head line is broad: most Oral-B
  rotating-oscillating handles back to ~2000 accept the same head series.
  Excludes the iO line (separate magnetic-drive mount).
