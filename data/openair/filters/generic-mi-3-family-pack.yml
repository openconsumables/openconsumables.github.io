notes: |
  Catch-all entry for generic / white-label cartridges sold as Mi Air
  Purifier 3-family compatible on AliExpress, Amazon, Temu. Brand names
  rotate; pack sizes and bundled-media combinations vary. Listings copy
  each other's compatibility lists, so marketplace-claim provenance here
  is not independent evidence.

  Whether any given generic preserves the M8R housing geometry, the
  claimed H13 grade, or a meaningful carbon stage is unknown until
  measured. Some listings cross-list Mi 2/2S/2H/Pro/Pro H in the title
  for SEO; the underlying compatibility claim is the same generation as
  the OEM M8R cartridge.
