notes: |
  Mi Air Purifier 3C (AC-M14-SC) is the budget variant of the 3-generation
  line: smaller CADR, no PM2.5 display, but the same cylindrical filter
  cartridge as the 3 and 3H. Xiaomi's filter store page cross-lists the
  M8R series as compatible with 3 / 3H / 3C / Pro / Pro H, which is the
  primary evidence that 3H and 3C share the slot. Aftermarket listings on
  AliExpress mostly tag this cluster by the unit model name (3H, 3C, Pro)
  rather than by the filter SKU.
