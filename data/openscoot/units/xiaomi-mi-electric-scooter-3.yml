notes: |
  The Mi Electric Scooter 3 keeps the 8.5x2 pneumatic format established by
  the M365 and shares the family slot for tire compatibility per
  aftermarket sellers. Xiaomi does not publish a hub-side spec sheet that
  would let the project assert manufacturer-claim cross-fit, so the
  interface assignment is inferred from the consistent 8.5x2 dimension and
  the absence of any manufacturer-stated incompatibility. Xiaomi's global
  product page identifies a rear dual-pad disc brake, so the pad-bearing
  brake architecture is manufacturer-claim for the global DDHBC16NEB page.
  DDHBC02NEB is retained as a regional alias from the earlier scooter data
  pass. Motor power and weight figures are manufacturer claims. Grip-tape
  fitment is left at marketplace-claim because this pass found a seller
  cross-listing Mi 3 with M365 / 1S / Essential mats, but no measured mat
  outline or Xiaomi spare-part listing.
